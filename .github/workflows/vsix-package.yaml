name: VsixPackage

on:
  push:
    branches:
      - main
    tags:
      # Publish to the Marketplace on a semver tag push (e.g. 1.2.0).
      # A tag ref guarantees github.ref == refs/tags/<tag>, which the
      # publish step below relies on. The previous `release: created`
      # trigger could fire during the draft phase with the `main` ref,
      # silently skipping the publish step.
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  quality:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Extension
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Extension Dependencies
        run: npm ci
      - name: Run Complete Quality Gate
        run: npm run check
      - name: Audit Production Dependencies
        run: npm run audit:prod

  publish:
    needs: quality
    if: success() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Extension
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Extension Dependencies
        run: npm ci
      - name: Run Complete Quality Gate
        run: npm run check
      - name: Audit Production Dependencies
        run: npm run audit:prod
      # Keep strict package-boundary verification adjacent to publication even
      # though `npm run check` already includes it. This makes the publishing
      # gate explicit and prevents a future workflow edit from bypassing it.
      - name: Verify and Publish Extension
        run: npm run verify-package && npm run deploy
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
